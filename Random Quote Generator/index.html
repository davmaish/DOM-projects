<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Random Quote Generator</title>

    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="container">
      <div class="quote-card">
        <span class="category"> Motivation </span>

        <div class="quote-content">
          <h1 id="quote">"Success is built through consistency."</h1>

          <p id="author">— Unknown</p>
        </div>

        <div class="button-container">
          <button id="generate-btn">Generate Quote</button>
          <button id="copy-btn">Copy Quote</button>
        </div>

        <p id="status-message">Click the button to generate a new quote.</p>
      </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
