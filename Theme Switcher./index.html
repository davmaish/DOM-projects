<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Theme Switcher</title>

    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="container">
      <div class="card">
        <h1>Theme Switcher</h1>

        <p>DOM manipulation by switching themes dynamically.</p>

        <div class="button-container">
          <button class="theme-btn" data-theme="dark">Dark</button>

          <button class="theme-btn" data-theme="light">Light</button>

          <button class="theme-btn" data-theme="blue">Blue</button>

          <button class="theme-btn" data-theme="green">Green</button>

          <button class="theme-btn" data-theme="random">Random</button>
        </div>
      </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
